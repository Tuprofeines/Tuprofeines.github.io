<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tu profe Inés · Clases para niños</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
      width: 100%;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      overflow-x: hidden;
      width: 100%;
      max-width: 100vw;
    }

    /* ─── NAV ─── */
    .pb-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: #F297A0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 40px;
    }
    .pb-logo {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 20px;
      color: #F3EBD8;
      text-decoration: none;
    }
    .pb-nav-links { display: flex; gap: 24px; align-items: center; }
    .pb-nav-links a {
      color: #F3EBD8;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .pb-nav-links a:hover { opacity: 1; }

    /* Contacto destacado en nav */
    .pb-nav-links a.nav-contacto {
      color: #F297A0;
      opacity: 1;
      background: #F3EBD8;
      border: 2px solid #F3EBD8;
      border-radius: 10px;
      padding: 5px 14px;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }
    .pb-nav-links a.nav-contacto:hover {
      background: transparent;
      color: #F3EBD8;
      transform: translateY(-1px);
    }

    /* Hamburger (móvil) */
    .pb-hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      flex-direction: column;
      gap: 5px;
      padding: 4px;
    }
    .pb-hamburger span {
      display: block;
      width: 22px; height: 2px;
      background: #F3EBD8;
      border-radius: 2px;
      transition: transform 0.2s, opacity 0.2s;
    }
    .pb-mobile-menu {
      display: none;
      position: fixed;
      top: 52px; left: 0; right: 0;
      background: #F297A0;
      z-index: 99;
      padding: 16px 40px 20px;
      flex-direction: column;
      gap: 14px;
    }
    .pb-mobile-menu.open { display: flex; }
    .pb-mobile-menu a {
      color: #F3EBD8;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      opacity: 0.85;
    }
    .pb-mobile-menu a.nav-contacto-mobile {
      color: #F297A0;
      background: #F3EBD8;
      border-radius: 10px;
      padding: 6px 14px;
      opacity: 1;
      display: inline-block;
      width: fit-content;
    }

    /* ─── SECCIONES ─── */
    section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 40px 60px;
      text-align: center;
      position: relative;
    }

    .s-hero        { background: #F297A0; }
    .s-metodo      { background: #F3EBD8; }
    .s-clases      { background: #F9D0CE; }
    .s-padres      { background: #B6BB79; }
    .s-contacto    { background: #F297A0; }

    /* Sobre mí — layout dividido */
    .s-sobre {
      background: #F9D0CE;
      flex-direction: row;
      align-items: stretch;
      padding: 0;
      text-align: left;
    }

    /* ─── TIPOGRAFÍA ─── */
    .pb-eyebrow {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 14px;
      opacity: 0.65;
    }
    .s-hero .pb-eyebrow,
    .s-contacto .pb-eyebrow { color: #F3EBD8; }
    .s-metodo .pb-eyebrow,
    .s-clases .pb-eyebrow   { color: #F297A0; }
    .s-padres .pb-eyebrow   { color: #F3EBD8; }

    section h1 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: clamp(36px, 6vw, 64px);
      line-height: 1.1;
      margin-bottom: 18px;
    }
    .s-hero h1,
    .s-contacto h1 { color: #F3EBD8; }
    .s-metodo h1,
    .s-clases h1   { color: #F297A0; }
    .s-padres h1   { color: #F3EBD8; }

    section p.lead {
      font-size: clamp(14px, 2vw, 17px);
      font-weight: 600;
      line-height: 1.75;
      max-width: 560px;
    }
    .s-hero p.lead,
    .s-contacto p.lead { color: #F3EBD8; opacity: 0.9; }
    .s-metodo p.lead,
    .s-clases p.lead   { color: #F297A0; opacity: 0.85; }
    .s-padres p.lead   { color: #F3EBD8; opacity: 0.9; }

    /* ─── BOTONES ─── */
    .pb-btn {
      margin-top: 28px;
      display: inline-block;
      padding: 13px 36px;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 0.5px;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .pb-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    .btn-cream { background: #F3EBD8; color: #F297A0; }
    .btn-pink  { background: #F297A0; color: #F3EBD8; }

    /* ─── SCROLL HINT ─── */
    .pb-scroll-hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      opacity: 0.45;
      animation: bounce 1.8s infinite;
      text-decoration: none;
    }
    .pb-scroll-hint span {
      font-family: 'Nunito', sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .pb-scroll-hint svg { width: 18px; height: 18px; }
    .s-hero .pb-scroll-hint span,
    .s-contacto .pb-scroll-hint span { color: #F3EBD8; }
    .s-hero .pb-scroll-hint svg,
    .s-contacto .pb-scroll-hint svg { stroke: #F3EBD8; }
    .s-metodo .pb-scroll-hint span,
    .s-clases .pb-scroll-hint span  { color: #F297A0; }
    .s-metodo .pb-scroll-hint svg,
    .s-clases .pb-scroll-hint svg   { stroke: #F297A0; }
    .s-padres .pb-scroll-hint span  { color: #F3EBD8; }
    .s-padres .pb-scroll-hint svg   { stroke: #F3EBD8; }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%        { transform: translateX(-50%) translateY(6px); }
    }

    /* ─── METODOLOGÍA ─── */

      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top:
